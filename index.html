<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bowls Scoreboard</title>
    <link rel="stylesheet" href="scoreboard.css">
</head>
<body>

    <!-- Player Bar -->
    <div class="player-bar">
        <div class="player home-player">Home Player</div>
        <div class="divider"></div>
        <div class="player away-player">Away Player</div>
    </div>

    <!-- Score Panel -->
    <div class="score-panel">
        <div class="score-box home-score">0</div>
        <div class="score-box away-score">0</div>
    </div>

    <!-- Buffer Display -->
    <div class="buffer-display">0</div>

    <!-- Keypad -->
    <div class="keypad">
        <button class="key">1</button>
        <button class="key">2</button>
        <button class="key">3</button>

        <button class="key">4</button>
        <button class="key">5</button>
        <button class="key">6</button>

        <button class="key">7</button>
        <button class="key">8</button>
        <button class="key">9</button>

        <button class="key zero">0</button>
        <button class="key add">Add</button>
        <button class="key clear">Clear</button>
    </div>

    <!-- Sticky Footer -->
    <div class="footer">
        <div class="footer-score home-total">0</div>
        <div class="footer-label">Total</div>
        <div class="footer-score away-total">0</div>
    </div>

    <script src="scoreboard.js"></script>
</body>
</html>
